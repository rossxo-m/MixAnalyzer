name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            script: package:win
            artifact: release/*.exe
          - os: macos-latest
            script: package:mac
            artifact: release/*.dmg

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mix-analyzer/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: mix-analyzer

      - name: Build
        run: npm run ${{ matrix.script }}
        working-directory: mix-analyzer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mix-analyzer-${{ matrix.os }}
          path: mix-analyzer/${{ matrix.artifact }}
          if-no-files-found: error
